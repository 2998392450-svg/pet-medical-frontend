<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宠物医疗预约系统</title>
    <!-- 百度地图 JS API 异步加载（避免 document.write 触发 parser-blocking 警告） -->
    <script>
      window._bmapAlerted = false;
      // 兜底：屏蔽百度地图 AK 相关的原生 alert
      const _origAlert = window.alert;
      window.alert = function(msg) {
        if (typeof msg === 'string' && /ak|api.*key|百度.*密钥|jsapi/i.test(msg)) {
          if (window._bmapAlerted) return;
          window._bmapAlerted = true;
          console.warn('[BMap] 百度地图 AK 相关提示已屏蔽:', msg);
          return;
        }
        return _origAlert.apply(this, arguments);
      };
    </script>
    <script>
      // 动态创建 script 标签异步加载百度地图，避免 document.write 警告
      (function() {
        var s = document.createElement('script');
        s.type = 'text/javascript';
        s.async = true;
        s.src = 'https://api.map.baidu.com/api?v=3.0&ak=CASqvUeiraXsdgAXnMitF7TTceYHojCp&callback=_bmapLoaded';
        s.onerror = function() {
          console.warn('[BMap] 百度地图加载失败，地图相关功能将不可用，其他功能不受影响');
        };
        document.head.appendChild(s);
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
